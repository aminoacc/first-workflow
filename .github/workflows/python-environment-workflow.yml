name: Python Build & Deploy Workflow

# 触发条件：手动触发 / main分支推送
on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main

# 任务定义
jobs:
  # Job 1：构建与测试（前置任务）
  build_test:
    runs-on: ubuntu-latest
    steps:
      # Step 1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2：配置Python环境（自动使用最新3.x版本）
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Step 3：安装依赖+运行测试
      - name: Install dependencies & test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          python -m unittest discover || echo "No tests found"

  # Job 2：部署到staging预发布环境
  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_test  # 必须等待build_test成功后执行
    environment: staging  # 绑定staging环境，触发审批规则
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate deployment to staging
        run: echo "Deploying Python app to staging environment..."

  # Job 3：部署到production生产环境
  deploy_production:
    runs-on: ubuntu-latest
    needs: deploy_staging  # 必须等待staging部署成功后执行
    environment: production  # 绑定production环境，触发审批规则
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate deployment to production
        run: echo "Deploying Python app to production environment..."