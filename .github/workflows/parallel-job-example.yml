name: Parallel Job Example
on: push

# Jobs 定义
jobs:
  # 第一个并行任务：build-and-test-1
  build-and-test-1:
    runs-on: ubuntu-latest
    # 该任务所有步骤共享的环境变量
    env:
      DEBUG: false

    steps:
      # Step 1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2：配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Step 3：仅在 main 分支运行
      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      # Step 4：仅在非 main 分支运行
      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      # Step 5：运行单元测试
      - name: Run Python tests
        run: |
          python <<EOF
          import unittest

          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)
              def test_truth(self):
                  self.assertTrue(True)

          if __name__ == "__main__":
              unittest.main()
          EOF

      # Step 6：仅当 DEBUG=true 时运行的调试步骤
      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  # 第二个并行任务：build-and-test-2（与 build-and-test-1 同时运行）
  build-and-test-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Python tests
        run: |
          python <<EOF
          print("Running tests in build-and-test-2 job")
          assert 2 * 2 == 4
          EOF

  # 串行任务：post-build-actions（仅在两个并行任务成功后运行）
  post-build-actions:
    needs: [build-and-test-1, build-and-test-2]  # 依赖声明
    runs-on: ubuntu-latest

    steps:
      - name: Generate test report
        run: echo "Test results generated successfully" > test-report.txt

      - name: Upload test report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt